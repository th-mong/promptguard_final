name: CI

on:
  push:
    branches: [master, develop_v*, feature/*]
  pull_request:
    branches: [master]

jobs:
  # ────────────────────────────────────────
  # TypeScript Tests (rule-engine + API)
  # ────────────────────────────────────────
  test-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install all deps
      - name: Install root deps
        run: npm install

      - name: Install rule-engine deps
        run: cd packages/rule-engine && npm install

      - name: Install API deps
        run: cd apps/api && npm install

      # Rule engine unit tests
      - name: Test rule-engine
        run: cd packages/rule-engine && npm test

      # Prisma generate + API E2E tests
      - name: Setup Prisma DB
        run: |
          cd apps/api
          npx prisma generate --schema prisma/schema.prisma
          npx prisma db push --schema prisma/schema.prisma
        env:
          DATABASE_URL: file:./dev.db

      - name: Test API E2E
        run: cd apps/api && npx jest --config jest.config.js
        env:
          DATABASE_URL: file:./dev.db

  # ────────────────────────────────────────
  # React Web Build
  # ────────────────────────────────────────
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install web deps
        run: cd apps/web && npm install

      - name: Build web
        run: cd apps/web && npx vite build

  # ────────────────────────────────────────
  # Python ML Tests
  # ────────────────────────────────────────
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      # ML model training (lightweight KNN ~2min)
      - name: Download data
        run: python scripts/download_data.py

      - name: Preprocess data
        run: python scripts/preprocess.py

      - name: Train KNN models
        run: python scripts/train.py -t all -m knn

      # Run ML integration test
      - name: Test rule engine with ML
        run: python scripts/test_rule_engine.py

  # ────────────────────────────────────────
  # Docker Build Test
  # ────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [test-typescript, build-web, test-python]
    steps:
      - uses: actions/checkout@v4

      - name: Build ML image
        run: docker build -f Dockerfile.ml -t promptguard-ml .

      - name: Build API image
        run: docker build -f Dockerfile.api -t promptguard-api .

      - name: Build Web image
        run: docker build -f Dockerfile.web -t promptguard-web .
